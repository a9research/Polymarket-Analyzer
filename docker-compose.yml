# Polymarket Account Analyzer + PostgreSQL
# （在克隆后的仓库根目录 Polymarket-Analyzer/ 下执行）
#
# 用法：
#   docker compose up --build
#   curl -s "http://127.0.0.1:3000/analyze/0x你的地址" | jq .
#
# 仅跑一次性分析（示例）：
#   docker compose run --rm -v "$(pwd)/out:/out" analyzer analyze 0x你的地址 --out /out/report.json
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polymarket_analyzer
    volumes:
      - polymarket_pgdata:/var/lib/postgresql/data
    # 需要宿主机连库调试时再取消注释（生产勿暴露）
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymarket_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # 连本 compose 里的 Postgres；无则程序无缓存/raw（仍可做纯分析）
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/polymarket_analyzer
      # 日志级别：info / debug 等，见 README「标准环境变量」
      RUST_LOG: ${RUST_LOG:-info}
      # 以下为可选业务参数（含义见 README「PAA_* 参数说明」）；取消注释即生效
      # Data API 每页条数与翻页步长，1～10000
      PAA_TRADES_PAGE_LIMIT: "300"
      # 每页 Data API 请求之间的间隔（毫秒），防限流
      PAA_RATE_LIMIT_MS: "200"
      # 默认是否拉 Goldsky 子图（true/false）；单次请求仍可用 ?with_subgraph= 覆盖
      PAA_SUBGRAPH_ENABLED: "true"
      # 子图每条流最多翻页数，控制耗时与数据量
      PAA_SUBGRAPH_MAX_PAGES: "20"
      # 报告缓存 TTL（秒），0 禁用
      PAA_CACHE_TTL_SEC: "86400"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # 默认：REST API。分页/子图默认等：用上面 PAA_* 或挂载 config — README「配置：TOML、PAA…」
    command: ["serve", "--bind", "0.0.0.0:3000"]
    # 使用自定义 TOML：先 cp config.docker.example.toml config.docker.toml 并编辑，再取消下面三行注释
    # volumes:
    #   - ./config.docker.toml:/config/config.toml:ro
    # command: ["--config", "/config/config.toml", "serve", "--bind", "0.0.0.0:3000"]

volumes:
  polymarket_pgdata:
