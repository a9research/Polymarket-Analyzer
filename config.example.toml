# Docker Compose 专用模板见 `config.docker.example.toml`（复制为 config.docker.toml）；README「仅靠 TOML」。
# --- 顶层：Data API 节奏与分页（详见 README「数据量与分页」）---
# 两次 Data API 请求之间的间隔（毫秒）
rate_limit_ms = 150

# GET /trades 的 limit，同时也是 offset 步长；最大 10000；默认 500（代码内）
# trades_page_limit = 3000

# Data API / Gamma HTTP 超时（秒）
# timeout_sec = 90

# 报告缓存 TTL（秒）
cache_ttl_sec = 600

# Postgres：若此处留空/删除，则使用环境变量 DATABASE_URL；若两者都有，以本文件为准
database_url = "postgres://postgres:postgres@localhost:5432/polymarket_analyzer"

# 浏览器（如 Vercel 子域名）直连 serve 时的 CORS；逗号分隔 Origin。也可用环境变量 PAA_CORS_ORIGINS。
# cors_allowed_origins = "https://stats.example.com,http://localhost:3000"

# --- Subgraph（Goldsky）；enabled 或 CLI/API --with-subgraph 时参与 analyze ---
[subgraph]
# 默认 false；改为 true 或与 --with-subgraph 联用
enabled = false
# 省略 activity_url / orderbook_url / pnl_url 时使用内置 Goldsky 默认端点
# page_size = 1000              # 每页条数（默认 1000）
# max_pages = 500               # 每流最多翻页数（默认 500）
# positions_page_size = 100     # PnL 持仓分页（默认 100）
# skip_pnl_positions = false    # true 可跳过 PnL 仓位拉取以省时间
# timeout_sec = 600
# max_retries = 5
# pnl_max_retries = 8
# cap_rows_per_stream = 0       # 每条子图流最多保留行数；0=不限制；冒烟可设 1000
# show_progress = true
# user_agent = "polymarket-account-analyzer/0.2 (subgraph)"
# Request extra orderFilledEvent fields (tx hash, condition, size, price). Auto-falls back to minimal fields if the
# subgraph rejects them (e.g. "Cannot query field …" or Goldsky-style "Type `OrderFilledEvent` has no field …").
# extended_fill_fields = true

# --- Analytics: which trade stream feeds lifetime/distribution/patterns (§1.5) ---
[analytics]
# Primary input for metrics: "data_api" (default) or "canonical" (synthetic trades from merged events; falls back if empty).
source = "data_api"
# When true (default), run in-memory canonical merge when possible and emit metrics_canonical_shadow + note on reconciliation_v1.
canonical_shadow = true

# --- Reconciliation: v0 (timestamp-only) when canonical off; v1 params used for canonical merge ---
[reconciliation]
enabled = false
# time_window_sec = 120
# size_tolerance_pct = 0.05
# price_tolerance_abs = 0.02
# require_condition_match = false
# rules_version = "1"
# P2 quality thresholds (also part of report_cache fingerprint)
# shadow_volume_alert_ratio = 0.30   # canonical_shadow: rel volume diff vs primary → quality_alert in notes
# api_only_ratio_alert = 0.40       # v1: api_only/(matched+api_only) above this and api_only ≥ min → alert
# api_only_alert_min = 12

# --- Raw ingestion: write ingestion_run + raw_ingestion_chunk when DATABASE_URL is set ---
[ingestion]
persist_raw = true
# Gamma markets/slug 调用上限（去重 slug），用于 entry→resolution 计时；0 = 不调 Gamma（省请求）
# max_gamma_slugs_for_timing = 150
# Data API /positions、/closed-positions 每页 limit；0 = 使用 trades_page_limit
# data_api_positions_limit = 0
# persist_raw 时是否写入 raw_data_api_open_positions / raw_data_api_closed_positions
# persist_positions_raw = true
# 是否写入 wallet_* 管线快照（规范化主交易行、可选 canonical 行、对账/前端/策略/整份报告）— 见 artifacts/wallet-pipeline-snapshot.md
# persist_wallet_snapshots = true
# PG 已有 wallet_primary_trade_row 时对 /trades 按水位增量拉取（依赖 API 新在前排序）
# data_api_incremental_trades = true
# data_api_incremental_max_pages = 250

# --- Canonical merge (Postgres): raw_* row tables, markets_dim, canonical_events, source_event_map, reconciliation_report ---
[canonical]
# Requires persist_raw + DATABASE_URL. Use `--with-canonical` / `?with_canonical=true` to override.
enabled = false
# enrich_markets_dim = true   # Gamma upsert into markets_dim for distinct trade slugs

[market_type]
default_type = "unknown"

[[market_type.rules]]
kind = "contains"
contains = "5-min"
type = "5-min"

[[market_type.rules]]
kind = "contains"
contains = "1h"
type = "1h"

[[market_type.rules]]
kind = "contains"
contains = "daily"
type = "daily"

[[market_type.rules]]
kind = "contains"
contains = "politics"
type = "politics"
